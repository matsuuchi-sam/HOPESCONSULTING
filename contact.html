<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }

:root {

  --color-accent: #d97757;
  --color-accent-light: #e08a6d;
  --color-cta-hover: #c4674a;

  --color-text-light: rgba(20, 20, 19, 0.55);

  --color-bg-alt: #dfddd3;
  --color-bg-warm: #f5f4ed;

  --font-display: "Noto Sans JP", sans-serif;
  --font-body: "Noto Sans JP", sans-serif;
  --font-dot: "DotGothic16", "Noto Sans JP", sans-serif;
  --font-pixel: "Silkscreen", cursive;
  --px: 4px;
}

body {
  font-family: var(--font-body);
  font-size: 1rem;
  line-height: 1.8;
  color: var(--color-text);
  background: var(--color-bg);
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background-image: radial-gradient(circle, rgba(20,20,19,0.12) 1px, transparent 1px);
  background-size: 20px 20px;
}

/* CRT vignette overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(20,20,19,0.15) 100%);
  pointer-events: none;
  z-index: 100;
}

/* ===== Header ===== */
.site-header {
  flex-shrink: 0;
  padding: 0.6rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}
.site-header a { text-decoration: none; color: var(--color-text); }
.logo { font-family: var(--font-pixel); font-weight: 700; font-size: 1rem; letter-spacing: 0.02em; }
.back-link { font-family: var(--font-pixel); font-size: 0.8rem; color: var(--color-text-light); transition: color 0.2s; letter-spacing: 0.02em; padding: 0.4rem 0.75rem; }
.back-link:hover { color: var(--color-accent); }

/* ===== Main ===== */
.main {
  flex: 1;
  max-width: 640px;
  margin: 0 auto;
  padding: 0.3rem 1.5rem 0.5rem;
  width: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 0;
}

.page-title {
  font-family: var(--font-pixel);
  font-size: 1.1rem;
  font-weight: 700;
  text-align: center;
  margin-bottom: 0.15rem;
  letter-spacing: 0.05em;
}

.page-subtitle {
  color: var(--color-text-light);
  font-size: 0.75rem;
  text-align: center;
  margin-bottom: 0.75rem;
  font-family: var(--font-dot);
}

/* ===== Form Card ===== */
.form-card {
  background: var(--color-bg-warm);
  border: 3px solid var(--color-border);
  padding: 1rem 1.5rem 1.25rem;
  clip-path: polygon(
    0 8px, 4px 8px, 4px 4px, 8px 4px, 8px 0,
    calc(100% - 8px) 0, calc(100% - 8px) 4px, calc(100% - 4px) 4px,
    calc(100% - 4px) 8px, 100% 8px,
    100% calc(100% - 8px), calc(100% - 4px) calc(100% - 8px),
    calc(100% - 4px) calc(100% - 4px), calc(100% - 8px) calc(100% - 4px),
    calc(100% - 8px) 100%, 8px 100%, 8px calc(100% - 4px),
    4px calc(100% - 4px), 4px calc(100% - 8px), 0 calc(100% - 8px)
  );
}

/* ===== Form Row (2-col) ===== */
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0 0.75rem;
}

/* ===== Form Fields ===== */
.form-group {
  margin-bottom: 0.6rem;
}

.form-label {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.25rem;
}

.form-label-text {
  font-family: var(--font-pixel);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.badge-required {
  font-family: var(--font-pixel);
  font-size: 0.55rem;
  letter-spacing: 0.08em;
  background: var(--color-accent);
  color: #fff;
  padding: 0.15rem 0.45rem;
  clip-path: polygon(
    0 4px, 4px 4px, 4px 0, calc(100% - 4px) 0,
    calc(100% - 4px) 4px, 100% 4px, 100% calc(100% - 4px),
    calc(100% - 4px) calc(100% - 4px), calc(100% - 4px) 100%,
    4px 100%, 4px calc(100% - 4px), 0 calc(100% - 4px)
  );
}

.badge-optional {
  font-family: var(--font-pixel);
  font-size: 0.55rem;
  letter-spacing: 0.08em;
  background: var(--color-bg-alt);
  color: var(--color-text-light);
  padding: 0.15rem 0.45rem;
  clip-path: polygon(
    0 4px, 4px 4px, 4px 0, calc(100% - 4px) 0,
    calc(100% - 4px) 4px, 100% 4px, 100% calc(100% - 4px),
    calc(100% - 4px) calc(100% - 4px), calc(100% - 4px) 100%,
    4px 100%, 4px calc(100% - 4px), 0 calc(100% - 4px)
  );
}

.form-input,
.form-textarea {
  width: 100%;
  background: var(--color-bg);
  border: 2px solid var(--color-border);
  font-family: var(--font-dot);
  font-size: 0.85rem;
  padding: 0.4rem 0.7rem;
  color: var(--color-text);
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
  border-radius: 0;
  -webkit-appearance: none;
}

.form-input:focus,
.form-textarea:focus {
  border-color: var(--color-accent);
  box-shadow: 0 0 0 2px rgba(217,119,87,0.2);
}

.form-input.has-error,
.form-textarea.has-error {
  border-color: #e74c3c;
  box-shadow: 0 0 0 2px rgba(231,76,60,0.15);
}

.form-textarea {
  min-height: 80px;
  resize: vertical;
  line-height: 1.6;
}

.form-error-bar {
  font-family: var(--font-dot);
  font-size: 0.7rem;
  color: #e74c3c;
  text-align: center;
  padding: 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s, padding 0.3s;
}
.form-error-bar.visible {
  max-height: 2rem;
  padding: 0.3rem 0.5rem;
}

/* ===== Privacy Checkbox ===== */
.privacy-group {
  margin-bottom: 0.75rem;
}

.privacy-label {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  cursor: pointer;
  font-family: var(--font-dot);
  font-size: 0.8rem;
  line-height: 1.6;
  color: var(--color-text);
}

.privacy-label input[type="checkbox"] {
  margin-top: 0.3rem;
  accent-color: var(--color-accent);
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.privacy-label a {
  color: var(--color-accent);
  text-decoration: underline;
  transition: color 0.2s;
}
.privacy-label a:hover {
  color: var(--color-cta-hover);
}

/* ===== Submit Button ===== */
.submit-btn {
  display: block;
  width: 100%;
  padding: 0.6rem 1.5rem;
  background: var(--color-accent);
  color: #fff;
  font-family: var(--font-pixel);
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  border: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: background 0.2s, transform 0.15s;
  clip-path: polygon(
    0 4px, 4px 4px, 4px 0, calc(100% - 4px) 0,
    calc(100% - 4px) 4px, 100% 4px, 100% calc(100% - 4px),
    calc(100% - 4px) calc(100% - 4px), calc(100% - 4px) 100%,
    4px 100%, 4px calc(100% - 4px), 0 calc(100% - 4px)
  );
}

.submit-btn:hover {
  background: var(--color-cta-hover);
  animation: pixelHover 0.3s ease;
}

.submit-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  pointer-events: none;
}

.submit-btn:hover::after {
  animation: crtFlash 0.4s ease-out;
}

/* ===== Scanlines ===== */
.form-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(20,20,19,0.02) 2px,
    rgba(20,20,19,0.02) 4px
  );
  pointer-events: none;
  z-index: 1;
}
.form-card {
  position: relative;
}
.form-card > * {
  position: relative;
  z-index: 2;
}

/* ===== Animations ===== */
@keyframes crtFlash {
  0% { background: rgba(255,255,255,0.35); }
  30% { background: rgba(255,255,255,0.08); }
  60% { background: rgba(255,255,255,0.15); }
  100% { background: rgba(255,255,255,0); }
}

@keyframes pixelHover {
  0% { transform: translate(0, 0); }
  25% { transform: translate(-1px, 1px); }
  50% { transform: translate(1px, -1px); }
  75% { transform: translate(-1px, -1px); }
  100% { transform: translate(0, 0); }
}

/* ===== Footer ===== */
.site-footer {
  flex-shrink: 0;
  text-align: center;
  padding: 0.4rem;
  font-family: var(--font-pixel);
  font-size: 0.75rem;
  color: var(--color-text-muted);
  letter-spacing: 0.05em;
}
.site-footer a { color: var(--color-text-light); text-decoration: none; transition: color 0.2s; }
.site-footer a:hover { color: var(--color-accent); }

/* ===== Reduced Motion ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ===== Mobile ===== */
@media (max-width: 600px) {
  .site-header { padding: 0.3rem 0.75rem; }
  .logo { font-size: 0.8rem; }
  .back-link { font-size: 0.65rem; padding: 0.3rem 0.5rem; }
  .main { padding: 0.15rem 0.6rem 0.2rem; }
  .page-title { font-size: 0.85rem; margin-bottom: 0.1rem; }
  .page-subtitle { font-size: 0.6rem; margin-bottom: 0.4rem; }
  .form-card { padding: 0.6rem 0.7rem 0.75rem; }
  .form-row { grid-template-columns: 1fr 1fr; gap: 0 0.5rem; }
  .form-group { margin-bottom: 0.35rem; }
  .form-label { margin-bottom: 0.15rem; }
  .form-label-text { font-size: 0.55rem; }
  .badge-required, .badge-optional { font-size: 0.45rem; padding: 0.1rem 0.35rem; }
  .form-input, .form-textarea { padding: 0.3rem 0.5rem; font-size: 0.75rem; }
  .form-textarea { min-height: 50px; }
  .submit-btn { padding: 0.4rem 0.8rem; font-size: 0.7rem; }
  .privacy-group { margin-bottom: 0.35rem; }
  .privacy-label { font-size: 0.6rem; }
  .privacy-label input[type="checkbox"] { width: 13px; height: 13px; margin-top: 0.2rem; }
  .form-error-bar { font-size: 0.6rem; }
  .site-footer { padding: 0.2rem; font-size: 0.55rem; }
}
</style>

<body>

<header class="site-header">
  <a href="./" class="logo">Hopes Consulting</a>
  <a href="./" class="back-link">Back to Top</a>
</header>

<main class="main">
  <h1 class="page-title">- CONTACT US -</h1>
  <p class="page-subtitle">お気軽にお問い合わせください。ご相談は無料です。</p>

  <div class="form-card">
    <form action="api/contact-confirm.php" method="post" id="contactForm" novalidate>

      <!-- Honeypot -->
      <div style="position:absolute;left:-9999px;top:-9999px;opacity:0;height:0;width:0;z-index:-1;" aria-hidden="true">
        <label for="website">ウェブサイト</label>
        <input type="text" name="website" id="website" tabindex="-1" autocomplete="off">
      </div>

      <!-- Timestamp for speed check -->
      <input type="hidden" name="form_loaded_at" id="form_loaded_at" value="">

      <!-- エラー表示エリア（上部に1行で表示） -->
      <div class="form-error-bar" id="formErrorBar"></div>

      <div class="form-row">
        <!-- お名前 -->
        <div class="form-group">
          <label class="form-label" for="name">
            <span class="form-label-text">Name</span>
            <span class="badge-required">REQUIRED</span>
          </label>
          <input type="text" name="name" id="name" class="form-input" placeholder="山田 太郎" required>
        </div>

        <!-- 会社名 -->
        <div class="form-group">
          <label class="form-label" for="company">
            <span class="form-label-text">Company</span>
            <span class="badge-optional">OPTIONAL</span>
          </label>
          <input type="text" name="company" id="company" class="form-input" placeholder="株式会社サンプル">
        </div>
      </div>

      <div class="form-row">
        <!-- メールアドレス -->
        <div class="form-group">
          <label class="form-label" for="email">
            <span class="form-label-text">Email</span>
            <span class="badge-required">REQUIRED</span>
          </label>
          <input type="email" name="email" id="email" class="form-input" placeholder="example@email.com" required>
        </div>

        <!-- 電話番号 -->
        <div class="form-group">
          <label class="form-label" for="phone">
            <span class="form-label-text">Phone</span>
            <span class="badge-optional">OPTIONAL</span>
          </label>
          <input type="tel" name="phone" id="phone" class="form-input" placeholder="090-1234-5678">
        </div>
      </div>

      <!-- お問い合わせ内容 -->
      <div class="form-group">
        <label class="form-label" for="message">
          <span class="form-label-text">Message</span>
          <span class="badge-required">REQUIRED</span>
        </label>
        <textarea name="message" id="message" class="form-textarea" placeholder="お問い合わせ内容をご記入ください。" required></textarea>
      </div>

      <!-- プライバシーポリシー同意 -->
      <div class="form-group privacy-group">
        <label class="privacy-label">
          <input type="checkbox" name="privacy_agree" id="privacy_agree" required>
          <span><a href="privacy.html" target="_blank">プライバシーポリシー</a>に同意する</span>
        </label>
      </div>

      <!-- 送信ボタン -->
      <button type="submit" class="submit-btn">&#9654; CONFIRM</button>

    </form>
  </div>
</main>

<footer class="site-footer">
  <a href="./">Hopes Consulting Inc.</a> &copy; 2026
</footer>

<script>
// Set form loaded timestamp
document.getElementById('form_loaded_at').value = Math.floor(Date.now() / 1000);

// Validation
(function() {
  var form = document.getElementById('contactForm');
  var errorBar = document.getElementById('formErrorBar');
  var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function showErrorBar(msg) {
    errorBar.textContent = msg;
    errorBar.classList.add('visible');
  }

  function clearErrors() {
    errorBar.textContent = '';
    errorBar.classList.remove('visible');
    document.querySelectorAll('.has-error').forEach(function(el) { el.classList.remove('has-error'); });
  }

  form.addEventListener('submit', function(e) {
    clearErrors();

    var name = document.getElementById('name');
    var email = document.getElementById('email');
    var message = document.getElementById('message');
    var privacy = document.getElementById('privacy_agree');

    if (!name.value.trim()) {
      name.classList.add('has-error');
      showErrorBar('▶ お名前を入力してください');
      e.preventDefault(); return;
    }
    if (!email.value.trim() || !emailRegex.test(email.value.trim())) {
      email.classList.add('has-error');
      showErrorBar('▶ 正しいメールアドレスを入力してください');
      e.preventDefault(); return;
    }
    if (!message.value.trim()) {
      message.classList.add('has-error');
      showErrorBar('▶ お問い合わせ内容を入力してください');
      e.preventDefault(); return;
    }
    if (!privacy.checked) {
      showErrorBar('▶ プライバシーポリシーへの同意が必要です');
      e.preventDefault(); return;
    }
  });

  // Clear error on input
  ['name', 'email', 'message'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) {
      el.addEventListener('input', function() {
        el.classList.remove('has-error');
        clearErrors();
      });
    }
  });

  document.getElementById('privacy_agree').addEventListener('change', function() {
    clearError('privacy-error', 'privacy_agree');
  });
})();
</script>
</body>
