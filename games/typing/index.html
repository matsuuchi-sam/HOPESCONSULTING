<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }

:root {
  --color-primary: #141413;
  --color-accent: #d97757;
  --color-accent-light: #e08a6d;
  --color-cta: #d97757;
  --color-cta-hover: #c4674a;
  --color-text: #141413;
  --color-text-light: rgba(20, 20, 19, 0.55);
  --color-text-muted: rgba(20, 20, 19, 0.4);
  --color-bg: #e8e6dc;
  --color-bg-alt: #dfddd3;
  --color-bg-warm: #f5f4ed;
  --color-border: rgba(194, 192, 182, 0.4);
  --font-display: "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
  --font-body: "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
  --font-accent: "Inter", sans-serif;
  --font-mono: "JetBrains Mono", "Consolas", monospace;
  --font-pixel: "Silkscreen", cursive;
  --font-dot: "DotGothic16", "Noto Sans JP", sans-serif;
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 10px;
  --radius-xl: 14px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 6px 6px 0 rgba(20,20,19,0.10);
  --shadow-lg: 6px 6px 0 rgba(20,20,19,0.10);
  --clip-card: polygon(0 8px, 4px 8px, 4px 4px, 8px 4px, 8px 0, calc(100% - 8px) 0, calc(100% - 8px) 4px, calc(100% - 4px) 4px, calc(100% - 4px) 8px, 100% 8px, 100% calc(100% - 8px), calc(100% - 4px) calc(100% - 8px), calc(100% - 4px) calc(100% - 4px), calc(100% - 8px) calc(100% - 4px), calc(100% - 8px) 100%, 8px 100%, 8px calc(100% - 4px), 4px calc(100% - 4px), 4px calc(100% - 8px), 0 calc(100% - 8px));
  --clip-btn: polygon(0 4px, 4px 4px, 4px 0, calc(100% - 4px) 0, calc(100% - 4px) 4px, 100% 4px, 100% calc(100% - 4px), calc(100% - 4px) calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 4px calc(100% - 4px), 0 calc(100% - 4px));
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: var(--font-body);
  font-size: 1rem;
  line-height: 1.8;
  color: var(--color-text);
  background: var(--color-bg);
  -webkit-font-smoothing: antialiased;
  min-height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background-image: radial-gradient(circle, rgba(20,20,19,0.12) 1px, transparent 1px);
  background-size: 20px 20px;
}
@supports (height: 100dvh) {
  body { height: 100dvh; }
  body:has(.typing-input:focus) { height: auto; min-height: 0; overflow: auto; }
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(20,20,19,0.15) 100%);
  pointer-events: none;
  z-index: 100;
}

/* 背景スプライト — モニター */
.bg-sprite {
  position: fixed;
  width: 4px;
  height: 4px;
  pointer-events: none;
  z-index: 0;
  box-shadow:
    4px 0 0 currentColor, 8px 0 0 currentColor, 12px 0 0 currentColor,
    16px 0 0 currentColor, 20px 0 0 currentColor, 24px 0 0 currentColor, 28px 0 0 currentColor,
    0px 4px 0 currentColor, 32px 4px 0 currentColor,
    0px 8px 0 currentColor, 32px 8px 0 currentColor,
    0px 12px 0 currentColor, 32px 12px 0 currentColor,
    0px 16px 0 currentColor, 32px 16px 0 currentColor,
    0px 20px 0 currentColor, 32px 20px 0 currentColor,
    4px 24px 0 currentColor, 8px 24px 0 currentColor, 12px 24px 0 currentColor,
    16px 24px 0 currentColor, 20px 24px 0 currentColor, 24px 24px 0 currentColor, 28px 24px 0 currentColor,
    8px 8px 0 currentColor, 12px 8px 0 currentColor, 16px 8px 0 currentColor,
    8px 12px 0 currentColor, 12px 12px 0 currentColor, 16px 12px 0 currentColor, 20px 12px 0 currentColor,
    8px 16px 0 currentColor, 12px 16px 0 currentColor, 20px 16px 0 currentColor,
    14px 28px 0 currentColor, 18px 28px 0 currentColor,
    10px 32px 0 currentColor, 14px 32px 0 currentColor, 18px 32px 0 currentColor, 22px 32px 0 currentColor;
}
.bg-sprite-1 { top: 22%; right: 10%; color: var(--color-text); opacity: 0.05; transform: scale(3) rotate(10deg); }
.bg-sprite-2 { top: 48%; left: 8%; color: var(--color-text); opacity: 0.04; transform: scale(3.5) rotate(-15deg); }
.bg-sprite-3 { bottom: 15%; right: 14%; color: var(--color-text); opacity: 0.04; transform: scale(2.5) rotate(25deg); }

.site-header {
  padding: 0.6rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}
.site-header a { text-decoration: none; color: var(--color-text); }
.logo { font-family: var(--font-pixel); font-weight: 700; font-size: 1rem; letter-spacing: 0.02em; }
.back-link { font-family: var(--font-pixel); font-size: 0.8rem; color: var(--color-text-light); transition: color 0.2s; padding: 0.4rem 0.75rem; }
.back-link:hover { color: var(--color-accent); }

.main {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0.25rem 1.5rem 0.5rem;
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
}

.game-title { font-family: var(--font-dot); font-size: 1.2rem; font-weight: 400; text-align: center; margin-bottom: 0.1rem; letter-spacing: 0.05em; -webkit-text-stroke: 0.5px currentColor; text-shadow: 0.5px 0 0 currentColor, -0.5px 0 0 currentColor; }
.game-subtitle { font-family: var(--font-dot); color: var(--color-text-light); font-size: 0.8rem; text-align: center; margin-bottom: 0.5rem; }

/* ===== Mode & Difficulty Select ===== */
.select-row {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
  flex-wrap: wrap;
  justify-content: center;
}
.select-row-label {
  font-family: var(--font-dot);
  font-size: 0.7rem;
  color: var(--color-text-muted);
  text-align: center;
  margin-bottom: 0.25rem;
  font-weight: 400;
}

.sel-btn {
  font-family: var(--font-dot);
  font-size: 0.8rem;
  font-weight: 400;
  padding: 0.5rem 1.25rem;
  border: 2px solid var(--color-border);
  background: var(--color-bg-warm);
  color: var(--color-text);
  cursor: pointer;
  transition: all 0.2s var(--ease-smooth);
  clip-path: var(--clip-btn);
}
.sel-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
.sel-btn.active { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }

/* ===== Game Area ===== */
/* ゲームエリア — A(二重ボーダー) + C(角ドット) + E(カラーシャドウ) */
.game-area-wrap { display: contents; }
.game-area {
  background: var(--color-bg-warm);
  padding: 1.25rem;
  width: 100%;
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border: 3px solid var(--color-text);
  box-shadow: 6px 6px 0 rgba(217, 119, 87, 0.25);
  clip-path: var(--clip-card);
  position: relative;
}
/* A: 内側ライン削除 — ゲーム中は枠が多すぎるため */
/* C: 四隅のプラスネジ（各角で回転角が違う） */
.screw {
  position: absolute;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--color-text);
  opacity: 0.2;
  z-index: 3;
}
.screw::before, .screw::after {
  content: '';
  position: absolute;
  background: var(--color-bg-warm);
}
/* 横棒 */
.screw::after {
  top: 50%; left: 2px; right: 2px;
  height: 1.5px;
  transform: translateY(-50%);
}
/* 縦棒 */
.screw::before {
  left: 50%; top: 2px; bottom: 2px;
  width: 1.5px;
  transform: translateX(-50%);
}
.screw-tl { top: 8px; left: 8px; transform: rotate(15deg); }
.screw-tr { top: 8px; right: 8px; transform: rotate(72deg); }
.screw-bl { bottom: 8px; left: 8px; transform: rotate(38deg); }
.screw-br { bottom: 8px; right: 8px; transform: rotate(55deg); }

.stats-bar { display: flex; justify-content: space-between; margin-bottom: 0.75rem; gap: 0.5rem; }
.stat-item { text-align: center; flex: 1; }
.stat-label { font-family: var(--font-dot); font-size: 0.7rem; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 400; }
.stat-value { font-family: var(--font-dot); font-size: 1.3rem; font-weight: 400; color: var(--color-text); line-height: 1.3; }
.stat-value.timer { color: var(--color-accent); }

/* ===== Word Display ===== */
.word-display {
  background: var(--color-bg);
  padding: 1.25rem;
  margin-bottom: 0.75rem;
  min-height: 70px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 3px solid var(--color-text);
  gap: 0.3rem;
  clip-path: var(--clip-card);
}

.word-japanese {
  font-family: var(--font-dot);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--color-text);
  letter-spacing: 0.05em;
  display: none;
}

.word-text {
  font-family: var(--font-mono);
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  line-height: 1.5;
  text-align: center;
  word-break: break-all;
}
.word-text .correct { color: #3d9a50; }
.word-text .incorrect { color: #d94444; background: rgba(217, 68, 68, 0.1); border-radius: 2px; }
.word-text .pending { color: var(--color-text-muted); }
.word-text .current { color: var(--color-text); border-bottom: 2px solid var(--color-accent); }

.typing-input {
  width: 100%;
  font-family: var(--font-mono);
  font-size: 1.1rem;
  padding: 0.75rem 1rem;
  border: 3px solid var(--color-text);
  background: #fff;
  color: var(--color-text);
  outline: none;
  transition: border-color 0.2s;
  clip-path: var(--clip-btn);
}
.typing-input:focus { border-color: var(--color-accent); }
.typing-input::placeholder { color: var(--color-text-muted); font-family: var(--font-body); font-size: 0.9rem; }
.typing-input:disabled { background: var(--color-bg-alt); cursor: not-allowed; }

.progress-wrap { margin-top: 0.5rem; background: var(--color-bg); border-radius: var(--radius-full); height: 5px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--color-accent); border-radius: var(--radius-full); transition: width 0.3s var(--ease-out); width: 0%; }

.start-screen { text-align: center; padding: 0.75rem 0; }
.start-screen p { font-family: var(--font-dot); color: var(--color-text-light); margin-bottom: 0.75rem; font-size: 0.85rem; line-height: 1.7; }
.start-btn {
  font-family: var(--font-dot); font-size: 0.9rem; font-weight: 400;
  padding: 0.75rem 2rem; background: var(--color-accent); color: #fff;
  border: none; cursor: pointer;
  transition: background 0.2s var(--ease-smooth); box-shadow: var(--shadow-sm);
  clip-path: var(--clip-btn);
}
.start-btn:hover { background: var(--color-cta-hover); }

.result-screen { text-align: center; padding: 0.25rem 0; display: none; }
.result-rank { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); margin-bottom: 0.2rem; }
.result-score { font-family: var(--font-dot); font-size: 2.5rem; font-weight: 400; color: var(--color-text); line-height: 1.1; }
.result-unit { font-size: 0.85rem; color: var(--color-text-light); font-weight: 500; }

.result-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.4rem; margin: 0.5rem 0; padding: 0.7rem; background: var(--color-bg); border: 2px solid var(--color-border); clip-path: var(--clip-card); }
.result-detail-item { text-align: center; }
.result-detail-label { font-family: var(--font-dot); font-size: 0.65rem; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
.result-detail-value { font-family: var(--font-dot); font-size: 1.05rem; font-weight: 400; }

.result-best { font-family: var(--font-dot); font-size: 0.75rem; color: var(--color-text-light); margin-bottom: 0.5rem; }
.result-best strong { color: var(--color-accent); font-family: var(--font-dot); }
.new-record { display: inline-block; background: var(--color-accent); color: #fff; font-family: var(--font-pixel); font-size: 0.55rem; font-weight: 700; padding: 0.15rem 0.5rem; margin-left: 0.4rem; vertical-align: middle; letter-spacing: 0.05em; clip-path: var(--clip-btn); }

/* Ranking */
.ranking-box { width: 100%; max-width: 260px; margin: 0 auto 0.4rem; }
.ranking-title { font-family: var(--font-pixel); font-size: 0.6rem; color: var(--color-text-muted); margin-bottom: 0.2rem; text-align: center; letter-spacing: 0.1em; }
.ranking-row { display: flex; align-items: center; gap: 0.4rem; padding: 0.15rem 0; font-family: var(--font-dot); font-size: 0.7rem; color: var(--color-text); }
.ranking-medal { font-size: 0.8rem; width: 1.2rem; text-align: center; }
.ranking-name { flex: 1; }
.ranking-score { font-weight: 700; color: var(--color-accent); }
.ranking-empty { font-family: var(--font-dot); font-size: 0.65rem; color: var(--color-text-muted); text-align: center; padding: 0.2rem 0; }
.ranking-input { font-family: var(--font-dot); font-size: 0.7rem; width: 3.5rem; padding: 0.15rem 0.3rem; border: 1.5px solid var(--color-accent); background: var(--color-bg); color: var(--color-text); text-align: center; text-transform: uppercase; clip-path: var(--clip-btn); }
.ranking-input::placeholder { color: var(--color-text-muted); }
.ranking-msg { font-family: var(--font-dot); font-size: 0.6rem; color: var(--color-accent); text-align: center; margin-top: 0.15rem; }

.result-actions { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
.btn-retry { font-family: var(--font-dot); font-size: 0.85rem; font-weight: 400; padding: 0.65rem 1.5rem; background: var(--color-accent); color: #fff; border: none; cursor: pointer; transition: background 0.2s var(--ease-smooth); clip-path: var(--clip-btn); white-space: nowrap; }
.btn-retry:hover { background: var(--color-cta-hover); }
.btn-share { font-family: var(--font-dot); font-size: 0.85rem; font-weight: 400; padding: 0.65rem 1.5rem; background: transparent; color: var(--color-text); border: 2px solid var(--color-border); cursor: pointer; transition: all 0.2s var(--ease-smooth); clip-path: var(--clip-btn); white-space: nowrap; }
.btn-share:hover { border-color: var(--color-accent); color: var(--color-accent); }

.site-footer { text-align: center; padding: 0.5rem; font-family: var(--font-pixel); font-size: 0.65rem; color: var(--color-text-muted); letter-spacing: 0.05em; }
.site-footer a { color: var(--color-text-light); text-decoration: none; transition: color 0.2s; }
.site-footer a:hover { color: var(--color-accent); }

@media (max-width: 600px) {
  .site-header { padding: 0.4rem 0.75rem; }
  .main { padding: 0.15rem 0.5rem 0.25rem; }
  .game-title { font-size: 1rem; margin-bottom: 0; }
  .game-subtitle { font-size: 0.65rem; margin-bottom: 0.25rem; }
  .game-area { padding: 0.75rem; }
  .select-row { margin-bottom: 0.5rem; gap: 0.35rem; }
  .sel-btn { font-size: 0.7rem; padding: 0.4rem 0.9rem; }
  .stats-bar { margin-bottom: 0.4rem; }
  .stat-value { font-size: 1.1rem; }
  .word-display { padding: 0.75rem; margin-bottom: 0.5rem; min-height: 55px; }
  .word-japanese { font-size: 1.1rem; }
  .word-text { font-size: 1.15rem; }
  .typing-input { font-size: 1rem; padding: 0.6rem 0.75rem; }
  .result-score { font-size: 2rem; }
  .result-details { gap: 0.3rem; padding: 0.5rem; }
  .result-detail-value { font-size: 0.9rem; }
  .result-best { font-size: 0.65rem; }
  .btn-retry, .btn-share { font-size: 0.75rem; padding: 0.5rem 1.2rem; }
  .site-footer { padding: 0.3rem; font-size: 0.6rem; }
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.4s var(--ease-out) forwards; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
.pulse { animation: pulse 0.3s var(--ease-out); }
</style>
</head>
<body>

<span class="bg-sprite bg-sprite-1" aria-hidden="true"></span>
<span class="bg-sprite bg-sprite-2" aria-hidden="true"></span>
<span class="bg-sprite bg-sprite-3" aria-hidden="true"></span>

<header class="site-header">
  <a href="../../" class="logo">Hopes Consulting</a>
  <a href="../" class="back-link">Back to Games</a>
</header>

<main class="main">

  <p class="game-subtitle">IT・ビジネス用語であなたのタイピング速度を測定</p>

  <div class="select-row-label">制限時間</div>
  <div class="select-row" id="timeSelect">
    <button class="sel-btn active" data-time="30">30秒</button>
    <button class="sel-btn" data-time="60">60秒</button>
    <button class="sel-btn" data-time="120">120秒</button>
  </div>

  <div style="height:1rem;"></div>

  <div class="game-area-wrap">
  <div class="game-area">
    <span class="screw screw-tl" aria-hidden="true"></span>
    <span class="screw screw-tr" aria-hidden="true"></span>
    <span class="screw screw-bl" aria-hidden="true"></span>
    <span class="screw screw-br" aria-hidden="true"></span>
    <div class="stats-bar" id="statsBar" style="display:none;">
      <div class="stat-item"><div class="stat-label">残り時間</div><div class="stat-value timer" id="timer">30</div></div>
      <div class="stat-item"><div class="stat-label">WPM</div><div class="stat-value" id="wpm">0</div></div>
      <div class="stat-item"><div class="stat-label">正確率</div><div class="stat-value" id="accuracy">100%</div></div>
      <div class="stat-item"><div class="stat-label">完了</div><div class="stat-value" id="wordsCompleted">0</div></div>
    </div>

    <div class="word-display" id="wordDisplay" style="display:none;">
      <div class="word-japanese" id="wordJapanese"></div>
      <div class="word-text" id="wordText"></div>
    </div>

    <input type="text" class="typing-input" id="typingInput" style="display:none;" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="url" enterkeyhint="next">

      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="start-screen" id="startScreen">
      <p>表示されるIT・ビジネス用語を正確に素早く入力してください。</p>
      <p style="font-size:0.85rem; margin-top:0.5rem; color:var(--color-text-light);">PC: Space キーでもスタートできます</p>
      <button class="start-btn" id="startBtn" style="margin-top:1rem;">スタート</button>
    </div>

    <div class="result-screen" id="resultScreen">
      <div class="result-rank" id="resultRank"></div>
      <div class="result-score" id="resultScore">0</div>
      <div class="result-unit">WPM（1分あたりの入力ワード数）</div>
      <div class="result-details">
        <div class="result-detail-item"><div class="result-detail-label">正確率</div><div class="result-detail-value" id="resultAccuracy">0%</div></div>
        <div class="result-detail-item"><div class="result-detail-label">入力文字数</div><div class="result-detail-value" id="resultChars">0</div></div>
        <div class="result-detail-item"><div class="result-detail-label">完了ワード</div><div class="result-detail-value" id="resultWords">0</div></div>
      </div>
      <div class="result-best" id="resultBest"></div>
      <div class="ranking-box" id="rankingBox" style="display:none;">
        <div class="ranking-title">TOP 3</div>
        <div id="rankingList"></div>
        <div class="ranking-msg" id="rankingMsg"></div>
      </div>
      <div class="result-actions">
        <button class="btn-retry" id="retryBtn">もう一度</button>
        <button class="btn-share" id="shareBtn">X でシェア</button>
        <button class="btn-share" id="copyBtn">結果をコピー</button>
      </div>
    </div>
  </div>
  </div>
</main>

<script>
// ===== Word Data =====
const wordsEn = {
  short: [
    "API", "SaaS", "DX", "IoT", "SQL", "CSS", "HTML", "UI", "UX", "CRM",
    "ERP", "RPA", "VPN", "DNS", "CDN", "KPI", "ROI", "BPO", "MVP", "SLA",
    "Git", "AWS", "GCP", "SDK", "CLI", "IDE", "OOP", "MVC", "REST", "CRUD",
    "JSON", "YAML", "XML", "HTTP", "SMTP", "SSH", "TCP", "SSL", "JWT", "OAuth",
    "Docker", "Linux", "React", "Vue.js", "Node.js", "MySQL", "Redis", "Nginx",
    "Slack", "Notion", "Figma", "Vercel", "Flask", "Rails", "Unity", "Swift",
    "Kotlin", "Rust", "Golang", "TypeScript", "Python", "DevOps", "Scrum",
    "Kanban", "Agile", "CI/CD", "NoSQL", "GraphQL", "WebRTC"
  ],
  medium: [
    "cloud computing", "machine learning", "deep learning",
    "natural language", "data science", "big data",
    "cyber security", "block chain", "smart contract",
    "digital marketing", "user interface", "code review",
    "pull request", "version control", "load balancer",
    "micro service", "server less", "container",
    "kubernetes", "terraform", "prometheus",
    "elastic search", "apache kafka", "data pipeline",
    "feature flag", "ab testing", "design system",
    "accessibility", "responsive", "progressive web app",
    "single page app", "static site", "headless CMS",
    "object storage", "edge computing", "zero trust",
    "infrastructure", "automation", "integration",
    "deployment", "monitoring", "observability",
    "scalability", "redundancy", "latency",
    "throughput", "bandwidth", "middleware",
    "algorithm", "encryption", "authentication",
    "authorization", "refactoring", "debugging"
  ],
  long: [
    "digital transformation strategy",
    "artificial intelligence solution",
    "business process automation",
    "customer relationship management",
    "enterprise resource planning",
    "application programming interface",
    "continuous integration delivery",
    "infrastructure as code",
    "platform as a service",
    "software as a service",
    "search engine optimization",
    "content management system",
    "relational database management",
    "object oriented programming",
    "test driven development",
    "domain driven design",
    "model view controller",
    "representational state transfer",
    "cross site scripting prevention",
    "virtual private network setup",
    "multi factor authentication",
    "role based access control",
    "single sign on integration",
    "data warehouse architecture",
    "extract transform load",
    "key performance indicator",
    "return on investment analysis",
    "agile project management",
    "minimum viable product launch",
    "user experience research",
    "conversion rate optimization",
    "robotic process automation",
    "natural language processing",
    "large language model training",
    "retrieval augmented generation"
  ]
};

// ===== Game State =====
let gameState = {
  isRunning: false,
  timeLeft: 30,
  totalTime: 30,
  currentWord: "",
  currentIndex: 0,
  correctChars: 0,
  totalChars: 0,
  wordsCompleted: 0,
  intervalId: null,
  wordQueue: []
};

// ===== DOM Elements =====
const typingInput = document.getElementById("typingInput");
const wordText = document.getElementById("wordText");
const wordJapanese = document.getElementById("wordJapanese");
const timerEl = document.getElementById("timer");
const wpmEl = document.getElementById("wpm");
const accuracyEl = document.getElementById("accuracy");
const wordsCompletedEl = document.getElementById("wordsCompleted");
const statsBar = document.getElementById("statsBar");
const startScreen = document.getElementById("startScreen");
const resultScreen = document.getElementById("resultScreen");
const progressWrap = document.getElementById("progressWrap");
const progressBar = document.getElementById("progressBar");
const startBtn = document.getElementById("startBtn");
const retryBtn = document.getElementById("retryBtn");
const shareBtn = document.getElementById("shareBtn");
const wordDisplay = document.getElementById("wordDisplay");

// ===== Time Buttons =====
document.querySelectorAll("#timeSelect .sel-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    if (gameState.isRunning) return;
    document.querySelectorAll("#timeSelect .sel-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    gameState.totalTime = parseInt(btn.dataset.time);
    gameState.timeLeft = gameState.totalTime;
    timerEl.textContent = gameState.timeLeft;
  });
});

// ===== Word Queue =====
function generateWordQueue() {
  const allWords = [...wordsEn.short, ...wordsEn.medium, ...wordsEn.long];
  return allWords.sort(() => Math.random() - 0.5);
}

function getNextWord() {
  if (gameState.wordQueue.length === 0) {
    gameState.wordQueue = generateWordQueue();
  }
  return gameState.wordQueue.pop();
}

// ===== Render Word =====
function renderWord(input) {
  const word = gameState.currentWord;
  let html = "";
  for (let i = 0; i < word.length; i++) {
    if (i < input.length) {
      if (input[i] === word[i]) {
        html += '<span class="correct">' + (word[i] === " " ? "&nbsp;" : escapeHtml(word[i])) + '</span>';
      } else {
        html += '<span class="incorrect">' + (word[i] === " " ? "&nbsp;" : escapeHtml(word[i])) + '</span>';
      }
    } else if (i === input.length) {
      html += '<span class="current">' + (word[i] === " " ? "&nbsp;" : escapeHtml(word[i])) + '</span>';
    } else {
      html += '<span class="pending">' + (word[i] === " " ? "&nbsp;" : escapeHtml(word[i])) + '</span>';
    }
  }
  wordText.innerHTML = html;
}

function escapeHtml(str) {
  var map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
  return str.replace(/[&<>"']/g, function(c) { return map[c]; });
}

// ===== Start Game =====
function startGame() {
  gameState = {
    isRunning: true,
    timeLeft: gameState.totalTime,
    totalTime: gameState.totalTime,
    currentWord: "",
    currentIndex: 0,
    correctChars: 0,
    totalChars: 0,
    wordsCompleted: 0,
    intervalId: null,
    wordQueue: generateWordQueue()
  };

  startScreen.style.display = "none";
  resultScreen.style.display = "none";
  statsBar.style.display = "flex";
  progressWrap.style.display = "block";
  wordDisplay.style.display = "";
  typingInput.style.display = "";
  typingInput.disabled = false;
  typingInput.value = "";
  typingInput.focus();

  timerEl.textContent = gameState.timeLeft;
  timerEl.style.color = "";
  wpmEl.textContent = "0";
  accuracyEl.textContent = "100%";
  wordsCompletedEl.textContent = "0";
  progressBar.style.width = "0%";

  loadNextWord();

  gameState.intervalId = setInterval(function() {
    gameState.timeLeft--;
    timerEl.textContent = gameState.timeLeft;

    var progress = ((gameState.totalTime - gameState.timeLeft) / gameState.totalTime) * 100;
    progressBar.style.width = progress + "%";

    var elapsed = gameState.totalTime - gameState.timeLeft;
    if (elapsed > 0) {
      var wpm = Math.round((gameState.correctChars / 5) / (elapsed / 60));
      wpmEl.textContent = wpm;
    }

    if (gameState.timeLeft <= 0) { endGame(); }
    if (gameState.timeLeft <= 5) { timerEl.style.color = "#d94444"; } else { timerEl.style.color = ""; }
  }, 1000);
}

function loadNextWord() {
  gameState.currentWord = getNextWord();
  gameState.currentIndex = 0;
  typingInput.value = "";
  wordJapanese.style.display = "none";
  renderWord("");
}

// ===== IME composition guard =====
var isComposing = false;
typingInput.addEventListener("compositionstart", function() { isComposing = true; });
typingInput.addEventListener("compositionend", function() {
  isComposing = false;
  typingInput.value = "";
});

// ===== Scroll into view on keyboard open =====
typingInput.addEventListener("focus", function() {
  setTimeout(function() {
    typingInput.scrollIntoView({ behavior: "smooth", block: "center" });
  }, 300);
});

// ===== Input Handler =====
typingInput.addEventListener("input", function() {
  if (!gameState.isRunning || isComposing) return;

  var input = typingInput.value;
  var word = gameState.currentWord;

  renderWord(input);

  if (input.length === word.length) {
    for (var i = 0; i < word.length; i++) {
      gameState.totalChars++;
      if (input[i] === word[i]) {
        gameState.correctChars++;
      }
    }

    gameState.wordsCompleted++;
    wordsCompletedEl.textContent = gameState.wordsCompleted;

    var acc = gameState.totalChars > 0
      ? Math.round((gameState.correctChars / gameState.totalChars) * 100)
      : 100;
    accuracyEl.textContent = acc + "%";

    wordDisplay.classList.remove("pulse");
    void wordDisplay.offsetWidth;
    wordDisplay.classList.add("pulse");

    loadNextWord();
  }
});

// Start button click
startBtn.addEventListener("click", function() {
  if (!gameState.isRunning) startGame();
});

// Space key to start
document.addEventListener("keydown", function(e) {
  if (!gameState.isRunning && e.key === " " && startScreen.style.display !== "none") {
    e.preventDefault();
    startGame();
  }
});

// ===== End Game =====
function endGame() {
  clearInterval(gameState.intervalId);
  gameState.isRunning = false;
  typingInput.disabled = true;

  // 未完了ワードの入力済み文字だけカウント（完了済みワードは既にカウント済み）
  var partialInput = typingInput.value;
  var partialWord = gameState.currentWord;
  if (partialInput.length > 0 && partialInput.length < partialWord.length) {
    for (var i = 0; i < partialInput.length; i++) {
      gameState.totalChars++;
      if (i < partialWord.length && partialInput[i] === partialWord[i]) {
        gameState.correctChars++;
      }
    }
  }

  var elapsed = gameState.totalTime;
  var wpm = Math.round((gameState.correctChars / 5) / (elapsed / 60));
  var accuracy = gameState.totalChars > 0
    ? Math.round((gameState.correctChars / gameState.totalChars) * 100)
    : 0;

  var rank = "";
  if (wpm >= 80) rank = "Legendary";
  else if (wpm >= 60) rank = "Expert";
  else if (wpm >= 45) rank = "Advanced";
  else if (wpm >= 30) rank = "Intermediate";
  else if (wpm >= 15) rank = "Beginner";
  else rank = "Novice";

  var storageKey = "typing_best_" + gameState.totalTime;
  var prevBest = parseInt(localStorage.getItem(storageKey) || "0");
  var isNewRecord = wpm > prevBest;
  if (isNewRecord) {
    localStorage.setItem(storageKey, wpm.toString());
  }

  statsBar.style.display = "none";
  progressWrap.style.display = "none";
  wordDisplay.style.display = "none";
  typingInput.style.display = "none";

  document.getElementById("resultRank").textContent = rank;
  document.getElementById("resultScore").textContent = wpm;
  document.getElementById("resultAccuracy").textContent = accuracy + "%";
  document.getElementById("resultChars").textContent = gameState.correctChars;
  document.getElementById("resultWords").textContent = gameState.wordsCompleted;

  var bestDisplay = isNewRecord ? wpm : Math.max(prevBest, wpm);
  document.getElementById("resultBest").innerHTML =
    "自己ベスト（" + gameState.totalTime + "秒）: <strong>" + bestDisplay + " WPM</strong>" +
    (isNewRecord ? '<span class="new-record">NEW RECORD</span>' : "");

  resultScreen.style.display = "block";
  resultScreen.classList.add("fade-in");

  // ランキング取得・表示
  fetchRanking("typing", wpm);
}

// ===== Ranking =====
var RANKING_API = "/api/ranking.php";
var MEDALS = ["\uD83E\uDD47", "\uD83E\uDD48", "\uD83E\uDD49"];

function fetchRanking(game, myScore) {
  var box = document.getElementById("rankingBox");
  var list = document.getElementById("rankingList");
  var msg = document.getElementById("rankingMsg");
  box.style.display = "none";
  list.innerHTML = "";
  msg.textContent = "";

  fetch(RANKING_API + "?game=" + game)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var rankings = data.rankings || [];
      var qualifies = false;

      if (rankings.length < 3) {
        qualifies = true;
      } else {
        var worst = parseFloat(rankings[rankings.length - 1].score);
        if (myScore > worst) qualifies = true;
      }

      renderRanking(rankings, qualifies, myScore, game);
      box.style.display = "";
    })
    .catch(function() {});
}

function renderRanking(rankings, qualifies, myScore, game) {
  var list = document.getElementById("rankingList");
  var msg = document.getElementById("rankingMsg");
  list.innerHTML = "";

  var rows = [];
  for (var i = 0; i < rankings.length; i++) {
    rows.push({ initials: rankings[i].initials, score: parseFloat(rankings[i].score), isMe: false });
  }

  if (qualifies) {
    var insertIdx = rows.length;
    for (var i = 0; i < rows.length; i++) {
      if (myScore > rows[i].score) {
        insertIdx = i;
        break;
      }
    }
    rows.splice(insertIdx, 0, { initials: null, score: myScore, isMe: true });
    if (rows.length > 3) rows = rows.slice(0, 3);
    msg.textContent = "ランクイン！イニシャルを入力してEnter";
  }

  for (var i = 0; i < 3; i++) {
    if (i < rows.length) {
      var r = rows[i];
      if (r.isMe) {
        list.innerHTML += '<div class="ranking-row">' +
          '<span class="ranking-medal">' + MEDALS[i] + '</span>' +
          '<input class="ranking-input" id="rankInput" maxlength="5" placeholder="A.B">' +
          '<span class="ranking-score">' + r.score + ' WPM</span>' +
          '</div>';
      } else {
        list.innerHTML += '<div class="ranking-row">' +
          '<span class="ranking-medal">' + MEDALS[i] + '</span>' +
          '<span class="ranking-name">' + escapeHtml(r.initials) + '</span>' +
          '<span class="ranking-score">' + parseFloat(r.score) + ' WPM</span>' +
          '</div>';
      }
    } else {
      list.innerHTML += '<div class="ranking-row"><span class="ranking-medal">' + MEDALS[i] + '</span><span class="ranking-empty">---</span></div>';
    }
  }

  if (qualifies) setupRankInput(game, myScore);
}

function setupRankInput(game, score) {
  setTimeout(function() {
    var input = document.getElementById("rankInput");
    if (!input) return;
    input.focus();
    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && input.value.trim()) {
        submitRanking(game, input.value.trim(), score);
      }
    });
  }, 100);
}

function submitRanking(game, initials, score) {
  var msg = document.getElementById("rankingMsg");
  msg.textContent = "登録中...";

  fetch(RANKING_API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ game: game, initials: initials, score: score })
  })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ranked) {
        msg.textContent = "登録しました！";
        var list = document.getElementById("rankingList");
        list.innerHTML = "";
        var rankings = data.rankings || [];
        for (var i = 0; i < rankings.length; i++) {
          list.innerHTML += '<div class="ranking-row">' +
            '<span class="ranking-medal">' + MEDALS[i] + '</span>' +
            '<span class="ranking-name">' + escapeHtml(rankings[i].initials) + '</span>' +
            '<span class="ranking-score">' + parseFloat(rankings[i].score) + ' WPM</span>' +
            '</div>';
        }
      } else {
        msg.textContent = "登録できませんでした";
      }
    })
    .catch(function() { msg.textContent = "通信エラー"; });
}

function escapeHtml(str) {
  var div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ===== Retry =====
retryBtn.addEventListener("click", function() {
  resultScreen.style.display = "none";
  resultScreen.classList.remove("fade-in");
  startScreen.style.display = "";
  gameState.wordQueue = generateWordQueue();
});

// ===== Share =====
function getTypingShareText() {
  var rank = document.getElementById("resultRank").textContent;
  var wpm = document.getElementById("resultScore").textContent;
  var accuracy = document.getElementById("resultAccuracy").textContent;
  var comment = document.getElementById("resultComment").textContent;
  return "IT タイピングスピードテスト｜" + wpm + " WPM（正確率 " + accuracy + "）｜" + rank + " - " + comment + "\n\nhttps://www.hopesconsul.com/games/typing/";
}
shareBtn.addEventListener("click", function() {
  var url = "https://x.com/intent/tweet?text=" + encodeURIComponent(getTypingShareText());
  window.open(url, "_blank", "width=550,height=420");
});
var copyBtn = document.getElementById("copyBtn");
copyBtn.addEventListener("click", function() {
  navigator.clipboard.writeText(getTypingShareText()).then(function() {
    copyBtn.textContent = "コピーしました！";
    setTimeout(function() { copyBtn.textContent = "結果をコピー"; }, 1500);
  });
});

// ===== Initial =====
(function init() {
  gameState.wordQueue = generateWordQueue();
})();
</script>
