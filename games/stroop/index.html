<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }

:root {
  --color-primary: #141413;
  --color-accent: #d97757;
  --color-accent-light: #e08a6d;
  --color-cta-hover: #c4674a;
  --color-text: #141413;
  --color-text-light: rgba(20, 20, 19, 0.55);
  --color-text-muted: rgba(20, 20, 19, 0.4);
  --color-bg: #e8e6dc;
  --color-bg-alt: #dfddd3;
  --color-bg-warm: #f5f4ed;
  --color-border: rgba(194, 192, 182, 0.4);
  --font-display: "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
  --font-body: "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
  --font-accent: "Inter", sans-serif;
  --font-mono: "JetBrains Mono", "Consolas", monospace;
  --font-pixel: "Silkscreen", cursive;
  --font-dot: "DotGothic16", "Noto Sans JP", sans-serif;
  --radius-lg: 10px;
  --radius-xl: 14px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 6px 6px 0 rgba(20,20,19,0.10);
  --shadow-lg: 6px 6px 0 rgba(20,20,19,0.10);
  --clip-card: polygon(0 8px, 4px 8px, 4px 4px, 8px 4px, 8px 0, calc(100% - 8px) 0, calc(100% - 8px) 4px, calc(100% - 4px) 4px, calc(100% - 4px) 8px, 100% 8px, 100% calc(100% - 8px), calc(100% - 4px) calc(100% - 8px), calc(100% - 4px) calc(100% - 4px), calc(100% - 8px) calc(100% - 4px), calc(100% - 8px) 100%, 8px 100%, 8px calc(100% - 4px), 4px calc(100% - 4px), 4px calc(100% - 8px), 0 calc(100% - 8px));
  --clip-btn: polygon(0 4px, 4px 4px, 4px 0, calc(100% - 4px) 0, calc(100% - 4px) 4px, 100% 4px, 100% calc(100% - 4px), calc(100% - 4px) calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 4px calc(100% - 4px), 0 calc(100% - 4px));
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: var(--font-body);
  font-size: 1rem;
  line-height: 1.8;
  color: var(--color-text);
  background: var(--color-bg);
  -webkit-font-smoothing: antialiased;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  background-image: radial-gradient(circle, rgba(20,20,19,0.12) 1px, transparent 1px);
  background-size: 20px 20px;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(20,20,19,0.15) 100%);
  pointer-events: none;
  z-index: 100;
}

/* 背景スプライト — カラードット */
.bg-sprite {
  position: fixed;
  width: 4px;
  height: 4px;
  pointer-events: none;
  z-index: 0;
  --c-red: #c0392b;
  --c-blue: #2980b9;
  --c-green: #27ae60;
  --c-yellow: #f39c12;
  box-shadow:
    8px 0 0 var(--c-red), 12px 0 0 var(--c-red),
    20px 4px 0 var(--c-blue), 24px 4px 0 var(--c-blue),
    4px 8px 0 var(--c-green), 8px 8px 0 var(--c-green),
    16px 8px 0 var(--c-yellow), 28px 8px 0 var(--c-red),
    0 12px 0 var(--c-blue), 12px 12px 0 var(--c-red),
    20px 12px 0 var(--c-green), 24px 12px 0 var(--c-blue),
    8px 16px 0 var(--c-yellow), 16px 16px 0 var(--c-blue),
    28px 16px 0 var(--c-green),
    4px 20px 0 var(--c-red), 12px 20px 0 var(--c-green),
    20px 20px 0 var(--c-yellow), 24px 20px 0 var(--c-red),
    0 24px 0 var(--c-yellow), 8px 24px 0 var(--c-blue),
    16px 24px 0 var(--c-green), 28px 24px 0 var(--c-yellow),
    4px 28px 0 var(--c-green), 20px 28px 0 var(--c-blue),
    12px 28px 0 var(--c-yellow), 24px 28px 0 var(--c-red);
}
.bg-sprite-1 { top: 22%; right: 10%; opacity: 0.06; transform: scale(3) rotate(10deg); }
.bg-sprite-2 { top: 48%; left: 8%; opacity: 0.05; transform: scale(3.5) rotate(-15deg); }
.bg-sprite-3 { bottom: 15%; right: 14%; opacity: 0.05; transform: scale(2.5) rotate(25deg); }

.site-header {
  padding: 0.6rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}
.site-header a { text-decoration: none; color: var(--color-text); }
.logo { font-family: var(--font-pixel); font-weight: 700; font-size: 1rem; letter-spacing: 0.02em; }
.back-link { font-family: var(--font-pixel); font-size: 0.8rem; color: var(--color-text-light); transition: color 0.2s; padding: 0.4rem 0.75rem; }
.back-link:hover { color: var(--color-accent); }

.main {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0.25rem 1.5rem 0.5rem;
  max-width: 500px;
  margin: 0 auto;
  width: 100%;
}

.game-title { font-family: var(--font-dot); font-size: 1.2rem; font-weight: 400; text-align: center; margin-bottom: 0.1rem; letter-spacing: 0.05em; -webkit-text-stroke: 0.5px currentColor; text-shadow: 0.5px 0 0 currentColor, -0.5px 0 0 currentColor; }
.game-subtitle { font-family: var(--font-dot); color: var(--color-text-light); font-size: 0.8rem; text-align: center; margin-bottom: 0.5rem; }

/* ===== Game Area ===== */
.game-area {
  background: var(--color-bg-warm);
  padding: 1.25rem;
  width: 100%;
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border: 3px solid var(--color-text);
  box-shadow: 6px 6px 0 rgba(217, 119, 87, 0.25);
  clip-path: var(--clip-card);
  position: relative;
}
/* プラスネジ装飾 */
.screw {
  position: absolute;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--color-text);
  opacity: 0.2;
  z-index: 3;
}
.screw::before, .screw::after {
  content: '';
  position: absolute;
  background: var(--color-bg-warm);
}
.screw::after {
  top: 50%; left: 2px; right: 2px;
  height: 1.5px;
  transform: translateY(-50%);
}
.screw::before {
  left: 50%; top: 2px; bottom: 2px;
  width: 1.5px;
  transform: translateX(-50%);
}
.screw-tl { top: 8px; left: 8px; transform: rotate(15deg); }
.screw-tr { top: 8px; right: 8px; transform: rotate(72deg); }
.screw-bl { bottom: 8px; left: 8px; transform: rotate(38deg); }
.screw-br { bottom: 8px; right: 8px; transform: rotate(55deg); }

/* ===== Stats Bar ===== */
.stats-bar { display: flex; justify-content: space-between; margin-bottom: 0.6rem; gap: 0.5rem; }
.stat-item { text-align: center; flex: 1; }
.stat-label { font-family: var(--font-dot); font-size: 0.65rem; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 400; }
.stat-value { font-family: var(--font-dot); font-size: 1.15rem; font-weight: 400; color: var(--color-text); line-height: 1.2; }

/* ===== Stroop Display ===== */
.stroop-display {
  background: var(--color-bg);
  padding: 1.2rem 1rem;
  margin-bottom: 0.6rem;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 3px solid var(--color-text);
  min-height: 80px;
  clip-path: var(--clip-card);
}

.stroop-word {
  font-family: var(--font-dot);
  font-size: 2.5rem;
  font-weight: 400;
  letter-spacing: 0.1em;
  transition: opacity 0.15s;
}

/* ===== Color Buttons ===== */
.color-buttons {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.5rem;
  margin-bottom: 0.4rem;
}

.color-btn {
  font-family: var(--font-dot);
  font-size: 1rem;
  font-weight: 400;
  padding: 0.75rem;
  min-height: 46px;
  border: 3px solid var(--color-border);
  background: #fff;
  cursor: pointer;
  transition: all 0.15s var(--ease-smooth);
  -webkit-tap-highlight-color: transparent;
  clip-path: var(--clip-btn);
}

.color-btn:active {
  transform: scale(0.95);
}

.color-btn.correct-flash {
  background: rgba(61, 154, 80, 0.15);
  border-color: #3d9a50;
}

.color-btn.incorrect-flash {
  background: rgba(217, 68, 68, 0.15);
  border-color: #d94444;
}

/* ===== Feedback ===== */
.feedback {
  text-align: center;
  font-family: var(--font-dot);
  font-size: 0.75rem;
  font-weight: 400;
  height: 1.3rem;
  line-height: 1.3rem;
}

.feedback.correct { color: #3d9a50; }
.feedback.incorrect { color: #d94444; }

/* ===== Progress Bar ===== */
.progress-wrap { margin-top: 0.3rem; background: var(--color-bg); border-radius: var(--radius-full); height: 5px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--color-accent); border-radius: var(--radius-full); transition: width 0.3s var(--ease-out); width: 0%; }

/* ===== Start Screen ===== */
.start-screen { text-align: center; padding: 0.5rem 0; }
.start-screen p { font-family: var(--font-dot); color: var(--color-text-light); margin-bottom: 0.6rem; font-size: 0.8rem; line-height: 1.6; }
.start-hint { font-size: 1.1rem; font-weight: 700; color: var(--color-accent); margin-bottom: 0.6rem; }

.start-example {
  background: var(--color-bg);
  padding: 0.8rem;
  margin-bottom: 0.8rem;
  border: 3px solid var(--color-text);
  clip-path: var(--clip-card);
}
.start-example-word {
  font-family: var(--font-dot);
  font-size: 1.6rem;
  font-weight: 400;
  margin-bottom: 0.3rem;
}
.start-example-desc {
  font-family: var(--font-dot);
  font-size: 0.7rem;
  color: var(--color-text-light);
}

.start-btn {
  font-family: var(--font-dot); font-size: 0.9rem; font-weight: 400;
  padding: 0.7rem 2rem; background: var(--color-accent); color: #fff;
  border: none; cursor: pointer;
  transition: background 0.2s var(--ease-smooth); box-shadow: var(--shadow-sm);
  clip-path: var(--clip-btn);
}
.start-btn:hover { background: var(--color-cta-hover); }

/* ===== Result Screen ===== */
.result-screen { text-align: center; padding: 0.25rem 0; display: none; }
.result-rank { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); margin-bottom: 0.2rem; }
.result-score { font-family: var(--font-dot); font-size: 2.5rem; font-weight: 400; color: var(--color-text); line-height: 1.1; }
.result-unit { font-family: var(--font-dot); font-size: 0.8rem; color: var(--color-text-light); font-weight: 400; margin-bottom: 0.5rem; }

.result-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.4rem; margin-bottom: 0.5rem; padding: 0.7rem; background: var(--color-bg); border: 2px solid var(--color-border); clip-path: var(--clip-card); }
.result-detail-item { text-align: center; }
.result-detail-label { font-family: var(--font-dot); font-size: 0.6rem; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
.result-detail-value { font-family: var(--font-dot); font-size: 1rem; font-weight: 400; }

.result-best { font-family: var(--font-dot); font-size: 0.75rem; color: var(--color-text-light); margin-bottom: 0.5rem; }
.result-best strong { color: var(--color-accent); font-family: var(--font-dot); }
.new-record { display: inline-block; background: var(--color-accent); color: #fff; font-family: var(--font-pixel); font-size: 0.55rem; font-weight: 700; padding: 0.15rem 0.5rem; margin-left: 0.4rem; vertical-align: middle; clip-path: var(--clip-btn); }

.result-actions { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
.btn-retry { font-family: var(--font-dot); font-size: 0.8rem; font-weight: 400; padding: 0.6rem 1.5rem; background: var(--color-accent); color: #fff; border: none; cursor: pointer; transition: background 0.2s var(--ease-smooth); clip-path: var(--clip-btn); }
.btn-retry:hover { background: var(--color-cta-hover); }
.btn-share { font-family: var(--font-dot); font-size: 0.8rem; font-weight: 400; padding: 0.6rem 1.5rem; background: transparent; color: var(--color-text); border: 2px solid var(--color-border); cursor: pointer; transition: all 0.2s var(--ease-smooth); clip-path: var(--clip-btn); }
.btn-share:hover { border-color: var(--color-accent); color: var(--color-accent); }

.site-footer { text-align: center; padding: 0.5rem; font-family: var(--font-pixel); font-size: 0.65rem; color: var(--color-text-muted); letter-spacing: 0.05em; }
.site-footer a { color: var(--color-text-light); text-decoration: none; transition: color 0.2s; }
.site-footer a:hover { color: var(--color-accent); }

@media (max-width: 600px) {
  .site-header { padding: 0.4rem 0.75rem; }
  .main { padding: 0.15rem 0.5rem 0.25rem; }
  .game-title { font-size: 1rem; margin-bottom: 0; }
  .game-subtitle { font-size: 0.65rem; margin-bottom: 0.25rem; }
  .game-area { padding: 0.75rem; }
  .stroop-display { padding: 0.8rem; min-height: 60px; margin-bottom: 0.5rem; }
  .stroop-word { font-size: 2rem; }
  .color-btn { padding: 0.6rem; font-size: 0.9rem; min-height: 42px; }
  .color-buttons { gap: 0.4rem; }
  .start-example-word { font-size: 1.4rem; }
  .result-score { font-size: 2rem; }
  .result-details { padding: 0.5rem; }
  .result-detail-value { font-size: 0.85rem; }
  .result-comment { font-size: 0.7rem !important; padding: 0.4rem 0.5rem !important; margin-bottom: 0.3rem !important; line-height: 1.5 !important; }
  .result-best { font-size: 0.65rem; }
  .btn-retry, .btn-share { font-size: 0.75rem; padding: 0.5rem 1.2rem; }
  .site-footer { padding: 0.3rem; font-size: 0.6rem; }
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.4s var(--ease-out) forwards; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
.shake { animation: shake 0.3s ease; }
</style>
</head>
<body>

<span class="bg-sprite bg-sprite-1" aria-hidden="true"></span>
<span class="bg-sprite bg-sprite-2" aria-hidden="true"></span>
<span class="bg-sprite bg-sprite-3" aria-hidden="true"></span>

<header class="site-header">
  <a href="../../" class="logo">Hopes Consulting</a>
  <a href="../" class="back-link">Back to Games</a>
</header>

<main class="main">
  <h1 class="game-title">ストループテスト</h1>
  <p class="game-subtitle">文字の意味ではなく「色」を答えよう</p>

  <div class="game-area">
    <span class="screw screw-tl" aria-hidden="true"></span>
    <span class="screw screw-tr" aria-hidden="true"></span>
    <span class="screw screw-bl" aria-hidden="true"></span>
    <span class="screw screw-br" aria-hidden="true"></span>
    <!-- Stats -->
    <div class="stats-bar" id="statsBar" style="display:none;">
      <div class="stat-item"><div class="stat-label">問題</div><div class="stat-value" id="questionNum">1/20</div></div>
      <div class="stat-item"><div class="stat-label">正解</div><div class="stat-value" id="correctCount">0</div></div>
      <div class="stat-item"><div class="stat-label">平均速度</div><div class="stat-value" id="avgTime">-</div></div>
    </div>

    <!-- Stroop Display -->
    <div class="stroop-display" id="stroopDisplay" style="display:none;">
      <div class="stroop-word" id="stroopWord"></div>
    </div>

    <!-- Color Buttons -->
    <div class="color-buttons" id="colorButtons" style="display:none;">
      <button class="color-btn" data-color="red">あか</button>
      <button class="color-btn" data-color="blue">あお</button>
      <button class="color-btn" data-color="green">みどり</button>
      <button class="color-btn" data-color="yellow">きいろ</button>
    </div>

    <!-- Feedback -->
    <div class="feedback" id="feedback"></div>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap" style="display:none;">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Start Screen -->
    <div class="start-screen" id="startScreen">
      <p>文字の<strong>意味</strong>ではなく、文字が塗られている<strong>色</strong>を答えてください。</p>
      <div class="start-example">
        <div class="start-example-word" style="color: #2563eb;">あか</div>
        <div class="start-example-desc">この場合、文字は「あか」ですが色は<strong>青</strong>なので「あお」が正解です</div>
      </div>
      <div class="start-hint">タップでスタート</div>
      <button class="start-btn" id="startBtn">スタート（20問）</button>
    </div>

    <!-- Result Screen -->
    <div class="result-screen" id="resultScreen">
      <div class="result-rank" id="resultRank"></div>
      <div class="result-score" id="resultScore">0</div>
      <div class="result-unit">正解率</div>

      <div class="result-details">
        <div class="result-detail-item"><div class="result-detail-label">正解数</div><div class="result-detail-value" id="resultCorrect">0/20</div></div>
        <div class="result-detail-item"><div class="result-detail-label">平均速度</div><div class="result-detail-value" id="resultAvgTime">0ms</div></div>
        <div class="result-detail-item"><div class="result-detail-label">最速回答</div><div class="result-detail-value" id="resultBestTime">0ms</div></div>
      </div>

      <div class="result-comment" id="resultComment" style="font-size:0.8rem; color:var(--color-text); margin-bottom:0.4rem; padding:0.5rem 0.7rem; background:var(--color-bg); border-radius:var(--radius-lg); line-height:1.5;"></div>

      <div class="result-best" id="resultBest"></div>

      <div class="result-actions">
        <button class="btn-retry" id="retryBtn">タイトルへ戻る</button>
        <button class="btn-share" id="shareBtn">X でシェア</button>
        <button class="btn-share" id="copyBtn">結果をコピー</button>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <a href="../../">Hopes Consulting Inc.</a> &copy; 2026<br>
  当サイトオリジナルのミニゲームです
</footer>

<script>
// ===== Color Data =====
var colors = [
  { name: "あか", css: "#dc2626", key: "red" },
  { name: "あお", css: "#2563eb", key: "blue" },
  { name: "みどり", css: "#16a34a", key: "green" },
  { name: "きいろ", css: "#ca8a04", key: "yellow" }
];

var TOTAL_QUESTIONS = 20;

// ===== Game State =====
var game = {
  isRunning: false,
  currentQuestion: 0,
  correctColor: null,
  correctCount: 0,
  times: [],
  questionStart: 0,
  locked: false
};

// ===== DOM =====
var statsBar = document.getElementById("statsBar");
var stroopDisplay = document.getElementById("stroopDisplay");
var stroopWord = document.getElementById("stroopWord");
var colorButtons = document.getElementById("colorButtons");
var feedback = document.getElementById("feedback");
var progressWrap = document.getElementById("progressWrap");
var progressBar = document.getElementById("progressBar");
var startScreen = document.getElementById("startScreen");
var resultScreen = document.getElementById("resultScreen");
var startBtn = document.getElementById("startBtn");
var retryBtn = document.getElementById("retryBtn");
var shareBtn = document.getElementById("shareBtn");

// ===== Start =====
startBtn.addEventListener("click", function() {
  startGame();
});

function startGame() {
  game = {
    isRunning: true,
    currentQuestion: 0,
    correctColor: null,
    correctCount: 0,
    times: [],
    questionStart: 0,
    locked: false
  };

  startScreen.style.display = "none";
  resultScreen.style.display = "none";
  statsBar.style.display = "flex";
  stroopDisplay.style.display = "flex";
  colorButtons.style.display = "grid";
  progressWrap.style.display = "block";
  feedback.textContent = "";
  feedback.className = "feedback";

  document.getElementById("questionNum").textContent = "1/" + TOTAL_QUESTIONS;
  document.getElementById("correctCount").textContent = "0";
  document.getElementById("avgTime").textContent = "-";
  progressBar.style.width = "0%";

  nextQuestion();
}

// ===== Generate Question =====
function nextQuestion() {
  game.currentQuestion++;
  game.locked = false;

  if (game.currentQuestion > TOTAL_QUESTIONS) {
    endGame();
    return;
  }

  document.getElementById("questionNum").textContent = game.currentQuestion + "/" + TOTAL_QUESTIONS;
  progressBar.style.width = ((game.currentQuestion - 1) / TOTAL_QUESTIONS * 100) + "%";

  // Pick random text and random color (must be different for stroop effect)
  var textIndex = Math.floor(Math.random() * colors.length);
  var colorIndex = textIndex;

  // 70% chance of mismatch (stroop effect), 30% match
  if (Math.random() < 0.7) {
    while (colorIndex === textIndex) {
      colorIndex = Math.floor(Math.random() * colors.length);
    }
  }

  var textColor = colors[textIndex];
  var displayColor = colors[colorIndex];

  stroopWord.textContent = textColor.name;
  stroopWord.style.color = displayColor.css;
  stroopWord.style.opacity = "1";

  game.correctColor = displayColor.key;
  game.questionStart = performance.now();

  // Clear feedback
  feedback.textContent = "";
  feedback.className = "feedback";

  // Reset button styles
  document.querySelectorAll(".color-btn").forEach(function(btn) {
    btn.classList.remove("correct-flash", "incorrect-flash");
  });
}

// ===== Button Click =====
var questionTimer = null;
document.querySelectorAll(".color-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    if (!game.isRunning || game.locked) return;
    game.locked = true;
    if (questionTimer) clearTimeout(questionTimer);

    var answer = btn.dataset.color;
    var elapsed = Math.round(performance.now() - game.questionStart);
    game.times.push(elapsed);

    if (answer === game.correctColor) {
      game.correctCount++;
      document.getElementById("correctCount").textContent = game.correctCount;
      feedback.textContent = "正解！ " + elapsed + "ms";
      feedback.className = "feedback correct";
      btn.classList.add("correct-flash");
    } else {
      feedback.textContent = "不正解... " + elapsed + "ms";
      feedback.className = "feedback incorrect";
      btn.classList.add("incorrect-flash");
      stroopDisplay.classList.remove("shake");
      void stroopDisplay.offsetWidth;
      stroopDisplay.classList.add("shake");
      // Highlight correct button
      document.querySelectorAll(".color-btn").forEach(function(b) {
        if (b.dataset.color === game.correctColor) {
          b.classList.add("correct-flash");
        }
      });
    }

    // Update avg time
    var avg = Math.round(game.times.reduce(function(a, b) { return a + b; }, 0) / game.times.length);
    document.getElementById("avgTime").textContent = avg + "ms";

    // Next question after delay
    questionTimer = setTimeout(function() {
      stroopWord.style.opacity = "0";
      questionTimer = setTimeout(function() {
        nextQuestion();
      }, 150);
    }, 500);
  });
});

// ===== End Game =====
function endGame() {
  game.isRunning = false;

  statsBar.style.display = "none";
  stroopDisplay.style.display = "none";
  colorButtons.style.display = "none";
  progressWrap.style.display = "none";
  feedback.textContent = "";

  var accuracy = Math.round((game.correctCount / TOTAL_QUESTIONS) * 100);
  var avg = game.times.length > 0
    ? Math.round(game.times.reduce(function(a, b) { return a + b; }, 0) / game.times.length)
    : 0;
  var best = game.times.length > 0 ? Math.min.apply(null, game.times) : 0;

  // Rank & Comment (speed-focused)
  var rank = "";
  var comment = "";
  if (accuracy < 60) {
    rank = "Novice";
    comment = "まずは正確に答えることを意識してみましょう。慣れると速くなります！";
  } else if (accuracy < 80) {
    rank = "Beginner";
    comment = "惜しいミスがありますね。色だけに集中すると正解率が上がります！";
  } else if (avg > 1000) {
    rank = "Careful";
    comment = "慎重派ですね。正確さはバッチリ！次は速度にもチャレンジしてみましょう。";
  } else if (avg > 700) {
    rank = "Intermediate";
    comment = "平均的な速度です。ストループ効果に少し惑わされていますが、良い結果です！";
  } else if (avg > 500) {
    rank = "Advanced";
    comment = "なかなか速い！脳の切り替え能力が高いです。500ms切りを目指してみましょう。";
  } else if (accuracy >= 90 && avg <= 400) {
    rank = "Legendary";
    comment = "驚異的な速度！ストループ効果をものともしない最高レベルの認知能力です。";
  } else {
    rank = "Expert";
    comment = "素晴らしい反応速度！文字の干渉をほぼ無視できています。トップクラスです。";
  }

  // Save best
  var storageKey = "stroop_best";
  var prevBest = 0;
  var isNewRecord = false;
  try {
    prevBest = parseInt(localStorage.getItem(storageKey) || "0");
    isNewRecord = accuracy > prevBest || (accuracy === prevBest && avg < parseInt(localStorage.getItem("stroop_best_time") || "99999"));
    if (isNewRecord) {
      localStorage.setItem(storageKey, accuracy.toString());
      localStorage.setItem("stroop_best_time", avg.toString());
    }
  } catch(e) { isNewRecord = false; }

  document.getElementById("resultRank").textContent = rank;
  document.getElementById("resultScore").textContent = accuracy + "%";
  document.getElementById("resultCorrect").textContent = game.correctCount + "/" + TOTAL_QUESTIONS;
  document.getElementById("resultAvgTime").textContent = avg + "ms";
  document.getElementById("resultBestTime").textContent = best + "ms";
  document.getElementById("resultComment").textContent = comment;

  var bestAccuracy = isNewRecord ? accuracy : Math.max(prevBest, accuracy);
  document.getElementById("resultBest").innerHTML =
    "自己ベスト: <strong>" + bestAccuracy + "%</strong>" +
    (isNewRecord ? '<span class="new-record">NEW RECORD</span>' : "");

  resultScreen.style.display = "block";
  resultScreen.classList.add("fade-in");
  progressBar.style.width = "100%";
}

// ===== Retry =====
retryBtn.addEventListener("click", function() {
  resultScreen.style.display = "none";
  resultScreen.classList.remove("fade-in");
  startScreen.style.display = "";
});

// ===== Share =====
function getStroopShareText() {
  var accuracy = document.getElementById("resultScore").textContent;
  var avg = document.getElementById("resultAvgTime").textContent;
  return "ストループテストで正解率 " + accuracy + "（平均 " + avg + "）を記録！\n文字の色を素早く答えられるかな？\n\nhttps://www.hopesconsul.com/games/stroop/";
}
shareBtn.addEventListener("click", function() {
  var url = "https://x.com/intent/tweet?text=" + encodeURIComponent(getStroopShareText());
  window.open(url, "_blank", "width=550,height=420");
});
var copyBtn = document.getElementById("copyBtn");
copyBtn.addEventListener("click", function() {
  navigator.clipboard.writeText(getStroopShareText()).then(function() {
    copyBtn.textContent = "コピーしました！";
    setTimeout(function() { copyBtn.textContent = "結果をコピー"; }, 1500);
  });
});
</script>
